events {}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_authorization $ctx_auth_present {
    default "present";
    "" "none";
  }

  log_format ctx_detailed '$remote_addr forwarded="$http_x_forwarded_for" '
                          'method=$request_method uri="$request_uri" '
                          'status=$status upstream_status=$upstream_status '
                          'req_time=$request_time upstream_time=$upstream_response_time '
                          'auth=$ctx_auth_present ua="$http_user_agent"';
  access_log /dev/stdout ctx_detailed;
  error_log /dev/stderr warn;

  proxy_buffer_size 256k;
  proxy_buffers 8 512k;
  proxy_busy_buffers_size 512k;
  large_client_header_buffers 8 256k;

  map $http_x_forwarded_proto $ctx_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  limit_req_zone $binary_remote_addr zone=ctx_api_zone:10m rate=30r/s;
  limit_req_status 429;

  upstream api_pac_context {
    server api-pac-context:8011;
  }

  server {
    listen 80;
    server_name pac-context-api.minhadelpi.com.br pac-context-api.centraldelpi.com.br;

    client_max_body_size 4m;

    location ~ /\.(env|git|htaccess|htpasswd|docker|npmrc) {
      deny all;
      return 404;
    }

    location / {
      limit_req zone=ctx_api_zone burst=50 nodelay;

      proxy_pass http://api_pac_context;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $ctx_proto;

      proxy_read_timeout 120s;
      proxy_connect_timeout 30s;
      proxy_send_timeout 120s;

      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }
  }
}
